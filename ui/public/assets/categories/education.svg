  <filter id="pencil" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB"><feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="2" result="t"></feTurbulence><feDisplacementMap in="SourceGraphic" in2="t" scale="1.4"></feDisplacementMap></filter>
</defs>
