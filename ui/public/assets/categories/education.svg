<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="1024" height="1024">
<defs>
  <filter id="wc-loose" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="3" result="t"></feTurbulence><feDisplacementMap in="SourceGraphic" in2="t" scale="14"></feDisplacementMap><feGaussianBlur stdDeviation="1.4"></feGaussianBlur></filter>
  <filter id="wc-wet" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="5" result="t"></feTurbulence><feDisplacementMap in="SourceGraphic" in2="t" scale="9" result="disp"></feDisplacementMap><feMorphology in="disp" operator="erode" radius="1.6" result="eroded"></feMorphology><feComposite in="disp" in2="eroded" operator="out" result="ring"></feComposite><feColorMatrix in="ring" values="0.55 0 0 0 0   0 0.55 0 0 0   0 0 0.55 0 0   0 0 0 1.4 0" result="darkRing"></feColorMatrix><feMerge><feMergeNode in="disp"></feMergeNode><feMergeNode in="darkRing"></feMergeNode></feMerge></filter>
